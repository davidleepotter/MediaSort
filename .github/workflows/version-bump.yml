name: Version Bump

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'MediaSort/MediaSort.csproj'
      - '.github/**'

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip version]')"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version in .csproj
        shell: bash
        run: |
          set -e
          CSPROJ="MediaSort/MediaSort.csproj"

          CURRENT=$(grep -oP '(?<=<Version>)[^<]+' "$CSPROJ" || echo "1.0.0")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          MAJOR=${MAJOR:-1}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
          PATCH=$((PATCH + 1))
          NEW="$MAJOR.$MINOR.$PATCH"
          NEW_FULL="$NEW.0"

          echo "Bumping $CURRENT -> $NEW"

          sed -i -E "s|<Version>[^<]+</Version>|<Version>${NEW}</Version>|" "$CSPROJ"
          sed -i -E "s|<FileVersion>[^<]+</FileVersion>|<FileVersion>${NEW_FULL}</FileVersion>|" "$CSPROJ"
          sed -i -E "s|<AssemblyVersion>[^<]+</AssemblyVersion>|<AssemblyVersion>${NEW_FULL}</AssemblyVersion>|" "$CSPROJ"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add MediaSort/MediaSort.csproj
          if git diff --staged --quiet; then
            echo "No version change to commit."
          else
            git commit -m "chore: bump version [skip version]"
            git push
          fi
